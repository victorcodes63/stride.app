<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stride - Social Media Preview</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #1A1714 0%, #FF5436 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, sans-serif;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .content {
            text-align: center;
            z-index: 2;
            position: relative;
        }
        
        .logo {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: -0.03em;
        }
        
        .tagline {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }
        
        .subtitle {
            font-size: 1.125rem;
            opacity: 0.75;
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="logo">Stride</div>
        <div class="tagline">Hit your stride.</div>
        <div class="subtitle">Operations platform for East African businesses</div>
    </div>
</body>
</html>
